<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Top Headlines - Live News Portal</title>
</head>

<body>
    <div class="container">
        <header>
            <h1 id="title-header">India Top Headlines</h1>
            <p id="sub-header">Live, real-time news articles from top publishers in India</p>
            <div>
                <button id="toggle-mode-btn">Switch to Weather</button>
            </div>
            <div id="weather-controls" style="display: none; margin-top: 15px; margin-bottom: 15px;">
                <input type="text" id="location-input" value="Delhi" placeholder="Enter city name">
                <button id="get-weather-btn">Get Weather</button>
            </div>
        </header>
        <main id="news-grid" class="news-grid"></main>
        <div id="weather-info" style="display: none; margin-top: 15px;"></div>
    </div>
    <script src="api.js"></script>
</body>

</html>
