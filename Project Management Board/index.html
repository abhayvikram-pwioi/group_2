<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Trello Board</title>

    <!-- Google Font (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <!-- Unified CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= HEADER ================= -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <div class="logo-text">
                <h2>TaskFlow</h2>
                <p>Project Board</p>
            </div>
        </div>

        <!-- SEARCH & FILTER BAR -->
        <div class="toolbar">
            <!-- Search by Title -->
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchBar" placeholder="Search tasks...">
            </div>

            <!-- Filter Assignee -->
            <div class="filter-box">
                <i class="fa-solid fa-user"></i>
                <select id="filterAssignee">
                    <option value="">All Assignees</option>
                    <option value="Ishika">Ishika</option>
                    <option value="Rahul">Rahul</option>
                    <option value="Aman">Aman</option>
                    <option value="Priya">Priya</option>
                </select>
            </div>

            <!-- Filter Priority -->
            <div class="filter-box">
                <i class="fa-solid fa-flag"></i>
                <select id="filterPriority">
                    <option value="">All Priorities</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>

            <!-- Filter Due Status -->
            <div class="filter-box">
                <i class="fa-solid fa-calendar-days"></i>
                <select id="filterDueStatus">
                    <option value="">All Deadlines</option>
                    <option value="Safe">Safe</option>
                    <option value="Warning">Near Deadline</option>
                    <option value="Overdue">Overdue</option>
                </select>
            </div>

            <!-- Reset Filters -->
            <button class="reset-filter" id="resetFiltersBtn">
                <i class="fa-solid fa-rotate-left"></i> Reset
            </button>
        </div>

        <!-- Actions & Profile -->
        <div class="header-actions">
            <button class="add-btn" id="openAddTaskModalBtn">
                <i class="fa-solid fa-plus"></i> Add Task
            </button>
            <div class="profile">
                <img src="https://ui-avatars.com/api/?name=Ishika&background=5B5BD6&color=fff" alt="profile">
            </div>
        </div>
    </header>

    <!-- ================= MAIN LAYOUT ================= -->
    <main class="main-layout">
        
        <!-- TEAM SIDEBAR -->
        <aside class="team-sidebar">
            <div class="sidebar-header">
                <h3>
                    <i class="fa-solid fa-users"></i> Team Members
                </h3>
                <p>Project Collaborators</p>
            </div>
            
            <div id="teamMembersList">
                <!-- Rendered dynamically by script.js -->
            </div>

            <button class="invite-btn" id="inviteMemberBtn">
                <i class="fa-solid fa-user-plus"></i> Invite Member
            </button>
        </aside>

        <!-- BOARD AREA -->
        <div class="board-container" id="boardContainer">
            <!-- Columns and Add Column Card rendered dynamically by script.js -->
        </div>

        <!-- ACTIVITY SIDEBAR -->
        <aside class="activity-sidebar">
            <div class="activity-header">
                <h3>
                    <i class="fa-solid fa-clock-rotate-left"></i> Activity Log
                </h3>
                <p>Recent project updates</p>
            </div>

            <div class="activity-list" id="activityList">
                <!-- Rendered dynamically by script.js -->
            </div>
        </aside>

    </main>

    <!-- ================= ADD/EDIT TASK MODAL ================= -->
    <div class="modal-overlay" id="taskModal">
        <div class="task-modal">
            <div class="modal-header">
                <div>
                    <h2 id="modalTitle">Create New Task</h2>
                    <p id="modalSubtitle">Add a task to your project board</p>
                </div>
                <button class="close-modal" id="closeModalBtn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form id="taskForm">
                <!-- Task Title -->
                <div class="form-group">
                    <label for="taskTitle">Task Title *</label>
                    <input type="text" id="taskTitle" placeholder="Enter task title...">
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" rows="3" placeholder="Describe your task..."></textarea>
                </div>

                <!-- Assignee & Priority -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskAssignee">Assign To</label>
                        <select id="taskAssignee">
                            <option value="">Choose Member</option>
                            <option value="Ishika">Ishika</option>
                            <option value="Rahul">Rahul</option>
                            <option value="Aman">Aman</option>
                            <option value="Priya">Priya</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                </div>

                <!-- Due Date & Column -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskDate">Due Date *</label>
                        <input type="date" id="taskDate">
                    </div>

                    <div class="form-group">
                        <label for="taskStatus">Status / Column</label>
                        <select id="taskStatus">
                            <!-- Populated dynamically by script.js based on active columns -->
                        </select>
                    </div>
                </div>

                <!-- Validation Error Message -->
                <p class="form-error" id="formError">Please fill in all required fields.</p>

                <!-- Modal Actions -->
                <div class="modal-footer">
                    <button type="button" class="cancel-btn" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="create-btn" id="submitTaskBtn">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Action completed successfully</div>

    <!-- Main JavaScript Logic -->
    <script src="script.js"></script>
</body>
</html>
