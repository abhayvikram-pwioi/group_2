<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - VELORA</title>
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <!-- header -->
    <header class="header">
        <div class="top-navbar">
            <div class="logo">
                <a href="index.html">VELORA</a>
            </div>
            <div class="nav-icons">
                <i class="fa-solid fa-magnifying-glass" id="searchBtn"></i>
                <i class="fa-regular fa-heart"></i>
                <div class="cart-icon">
                    <a href="cart.html">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span id="cart-badge">0</span>
                    </a>
                </div>
                <i class="fa-regular fa-user"></i>
            </div>
        </div>
    </header>

    <!-- cart -->
    <div class="container">
        <!-- Shopping Cart -->
        <div class="cart-box">
            <div class="cart-header">
                <div>
                    <h1>Shopping Cart</h1>
                    <p id="cart-count-header">You have 0 items in your cart</p>
                </div>
                <div class="clear-btn" id="cart-clear-btn">Clear All</div>
            </div>
            <hr>
            <div id="cart-items-container">
                <!-- Dynamic Items will be rendered here -->
            </div>
        </div>

        <!-- Order Summary -->
        <div class="summary-box">
            <h2>Order Summary</h2>
            <hr>
            <p id="cart-summary-subtotal">Subtotal : Rs 0</p>
            <p>Shipping : FREE</p>
            <p id="cart-summary-tax">Tax : Rs 0</p>
            <hr>
            <h2 id="cart-summary-total">Total : Rs 0</h2>
            <button id="cart-checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <script src="cart.js" defer></script>
</body>
</html>
