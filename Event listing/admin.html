<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | EventHub</title>

    <link rel="stylesheet" href="admin.css">

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- ================= Sidebar ================= -->

    <aside class="sidebar">

        <div>

            <div class="logo">

                
                <h2><span>Connect</span></h2>

            </div>

            <ul class="menu">

    <li class="active" id="dashboardLink">

        

     Dashboard

    </li>

    <li id="eventsLink">

       
        Events

    </li>

</ul>



    </aside>



    <!-- ================= Main ================= -->

    <main class="main-content">


        <!-- Top Navbar -->

        <header class="topbar">

            <h1> Admin Dashboard</h1>

            <div class="admin-profile" id="profileBtn">

    <div class="avatar">
        AD
    </div>

    <div>

        <h4>Admin</h4>

       

    </div>

    <i class="fa-solid fa-chevron-down"></i>

</div>

<!-- Profile Dropdown -->

<div class="profile-menu" id="profileMenu">

    <div class="profile-info">

        <div class="avatar">

            AD

        </div>

        <div>

            <h4>Admin</h4>

            <p>Administrator</p>

        </div>

    </div>

    <hr>

    <button class="logout-btn" id="logoutBtn">


        <i class="fa-solid fa-right-from-bracket"></i>

        Logout

    </button>

</div>
        </header>



        <!-- Welcome -->

        <section class="welcome" id="dashboardSection">

            <h2>

                Welcome , Admin

            </h2>

            <p>

                Manage your events from one place.

            </p>

        </section>



        <!-- Event Section -->

        <section class="event-section" id="eventsSection">

            <div class="event-header">

                <h2>Your Events</h2>

                <button class="add-btn">

                    <i class="fa-solid fa-plus"></i>

                    Add Event

                </button>

            </div>

            <!-- ================= EVENTS TABLE ================= -->
<div class="event-table">

    <table>

        <thead>

            <tr>

                <th>Event Name</th>
                <th>Category</th>
                <th>Date & Time</th>
                <th>Location</th>
                <th>Attendees</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody id="eventTableBody">
            <!-- Rendered dynamically by admin.js -->
        </tbody>

    </table>

</div>
        </section>


    </main>

</div>

<!-- ================= ADD EVENT MODAL ================= -->

<div class="modal" id="eventModal">

    <div class="event-modal">

        <span class="close-event">&times;</span>

        <h2>Add New Event</h2>

        <p>Create a new event for your platform.</p>

        <form id="eventForm">

            <div class="input-group">

                <label>Event Name</label>

                <input type="text" id="eventName" placeholder="Enter event name" required>


            </div>

            <div class="row">
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="input-group">
                    <label>Time</label>
                    <input type="text" id="eventTime" placeholder="e.g. 10:00 AM" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Location / Venue</label>
                    <input type="text" id="eventLocation" placeholder="Event location" required>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="eventCategory">
                        <option>Technology</option>
                        <option>Workshop</option>
                        <option>Music</option>
                        <option>Sports</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Maximum Seats</label>
                    <input type="number" id="eventSeats" placeholder="Enter maximum seats" min="1" required>
                </div>
                <div class="input-group">
                    <label>Banner Image URL</label>
                    <input type="text" id="eventImageURL" placeholder="e.g. assets/music.jpeg or unsplash URL">
                </div>
            </div>

            <div class="input-group">
                <label>Or Choose Local File</label>
                <input type="file" id="eventImageFile" accept="image/*">
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea 
                id="eventDescription" 
                rows="4" 
                placeholder="Write event description..."
                required></textarea>
            </div>

            <button class="save-btn" id="saveBtn">
                Create Event
            </button>

        </form>

    </div>

</div>



<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script src="db.js"></script>
<script src="admin.js"></script>

</body>

</html>
