<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | Connect</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6C3EF4;
            --primary-dark: #5527d9;
            --text-main: #1a202c;
            --text-muted: #718096;
            --bg-light: #f7fafc;
            --border: #e2e8f0;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --gradient: linear-gradient(135deg, #6C3EF4, #4f46e5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Back Button */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 25px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--primary);
        }

        /* Card Wrapper */
        .details-wrapper {
            background: #fff;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Banner Hero */
        .banner-container {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            background: #2d3748;
        }
        .banner-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .banner-container:hover .banner-image {
            transform: scale(1.03);
        }
        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.7));
        }
        .category-badge {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--gradient);
            color: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(108, 62, 244, 0.3);
        }

        /* Content Layout */
        .content-grid {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 40px;
            padding: 40px;
        }

        /* Left Side */
        .main-info h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            line-height: 1.3;
        }
        .description-section h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }
        .description-text {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.8;
            white-space: pre-line;
        }

        /* Right Side Sidebar Box */
        .sidebar-card {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-self: flex-start;
            position: sticky;
            top: 20px;
        }

        .meta-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        .meta-item i {
            font-size: 18px;
            color: var(--primary);
            margin-top: 3px;
            width: 20px;
            text-align: center;
        }
        .meta-text h4 {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .meta-text p {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Progress Bar */
        .occupancy-wrapper {
            margin-top: 10px;
        }
        .occupancy-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 10px;
            transition: width 0.5s ease-out;
        }

        /* Buttons */
        .action-btn {
            width: 100%;
            background: var(--gradient);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 62, 244, 0.2);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(108, 62, 244, 0.3);
        }
        .action-btn:disabled {
            background: #cbd5e0;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Error Screen */
        .error-card {
            background: #fff;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            max-width: 500px;
            margin: 80px auto;
        }
        .error-icon {
            font-size: 48px;
            color: #e53e3e;
            margin-bottom: 20px;
        }
        .error-card h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .error-card p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        /* Modal Overlay */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .modal-body {
            margin-bottom: 25px;
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
        }
        .modal-body p {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .modal-body p strong {
            color: var(--text-muted);
        }
        .modal-footer {
            display: flex;
            gap: 12px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .modal-btn-confirm {
            background: var(--gradient);
            color: #fff;
        }
        .modal-btn-confirm:hover {
            box-shadow: 0 8px 20px rgba(108, 62, 244, 0.25);
        }
        .modal-btn-cancel {
            background: #edf2f7;
            color: var(--text-muted);
        }
        .modal-btn-cancel:hover {
            background: #e2e8f0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            .banner-container {
                height: 250px;
            }
            .content-grid {
                grid-template-columns: 1fr;
                padding: 25px;
                gap: 30px;
            }
            .sidebar-card {
                position: static;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="pageContent">
        <!-- Will be populated dynamically -->
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Confirm Registration</h3>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Populated dynamically -->
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="cancelModalBtn">Cancel</button>
                <button class="modal-btn modal-btn-confirm" id="confirmModalBtn">Confirm</button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const eventId = parseInt(params.get("id"));

            const pageContent = document.getElementById("pageContent");
            if (isNaN(eventId)) {
                renderError("Invalid Event", "The requested event parameter is missing or invalid.");
                return;
            }

            const event = getEvents().find(e => e.id === eventId);
            if (!event) {
                renderError("Event Not Found", "The event you are looking for does not exist or has been removed.");
                return;
            }

            renderEventDetails(event);
        });

        function renderError(title, msg) {
            document.getElementById("pageContent").innerHTML = `
                <div class="error-card">
                    <div class="error-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
                    <h2>${title}</h2>
                    <p>${msg}</p>
                    <a href="home.html" class="back-link" style="justify-content: center; margin-bottom: 0;">
                        <i class="fa-solid fa-arrow-left"></i> Return to Homepage
                    </a>
                </div>
            `;
        }

        function renderEventDetails(event) {
            const container = document.getElementById("pageContent");
            const user = getCurrentUser();
            const regs = getRegistrations();

            const registered = user && regs.some(r => r.userEmail === user.email && r.eventId === event.id);
            const full = (event.attendees || 0) >= (event.maxAttendees || 100);
            const fillPercentage = Math.min(100, Math.round(((event.attendees || 0) / (event.maxAttendees || 100)) * 100));

            let actionBtnText = "Register Now";
            let btnDisabled = false;
            let btnBg = "";

            if (registered) {
                actionBtnText = "✓ Registered";
                btnDisabled = true;
                btnBg = "background: #22C55E;";
            } else if (full) {
                actionBtnText = "Fully Booked";
                btnDisabled = true;
                btnBg = "background: #ef4444;";
            } else if (user && user.role === "admin") {
                actionBtnText = "Admins Cannot Register";
                btnDisabled = true;
            }

            container.innerHTML = `
                <a href="home.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Back to Events
                </a>

                <div class="details-wrapper">
                    <!-- Banner -->
                    <div class="banner-container">
                        <img class="banner-image" src="${event.image || getCategoryPlaceholder(event.category)}" alt="${event.title}" onerror="this.src='assets/workshop.jpeg'">
                        <div class="banner-overlay"></div>
                        <span class="category-badge">${event.category}</span>
                    </div>

                    <!-- Grid Content -->
                    <div class="content-grid">
                        <!-- Left Main Info -->
                        <div class="main-info">
                            <h1>${event.title}</h1>
                            <div class="description-section">
                                <h3>About This Event</h3>
                                <p class="description-text">${event.description || 'No description provided.'}</p>
                            </div>
                        </div>

                        <!-- Right Sidebar Card -->
                        <div class="sidebar-card">
                            <div class="meta-item">
                                <i class="fa-solid fa-calendar-days"></i>
                                <div class="meta-text">
                                    <h4>Date</h4>
                                    <p>${formatDate(event.date)}</p>
                                </div>
                            </div>

                            <div class="meta-item">
                                <i class="fa-solid fa-clock"></i>
                                <div class="meta-text">
                                    <h4>Time</h4>
                                    <p>${event.time || '10:00 AM'}</p>
                                </div>
                            </div>

                            <div class="meta-item">
                                <i class="fa-solid fa-location-dot"></i>
                                <div class="meta-text">
                                    <h4>Location</h4>
                                    <p>${event.location}</p>
                                </div>
                            </div>

                            <!-- Occupancy Progress Bar -->
                            <div class="occupancy-wrapper">
                                <div class="occupancy-label">
                                    <span>Attendees</span>
                                    <span>${event.attendees || 0} / ${event.maxAttendees || 100}</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" style="width: ${fillPercentage}%"></div>
                                </div>
                            </div>

                            <button class="action-btn" id="regActionBtn" ${btnDisabled ? 'disabled' : ''} style="${btnBg}">
                                <i class="fa-solid fa-ticket"></i> ${actionBtnText}
                            </button>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById("regActionBtn")?.addEventListener("click", () => {
                handleEventRegistration(event);
            });
        }

        function handleEventRegistration(event) {
            const user = getCurrentUser();
            if (!user) {
                showToast("Please log in to register.", "info");
                setTimeout(() => {
                    window.location.href = "home.html?action=login";
                }, 1000);
                return;
            }

            const confirmModal = document.getElementById("confirmModal");
            const modalBody = document.getElementById("modalBody");
            
            modalBody.innerHTML = `
                <p><strong>Event:</strong> ${event.title}</p>
                <p><strong>Name:</strong> ${user.name}</p>
                <p><strong>Email:</strong> ${user.email}</p>
                <p><strong>Date:</strong> ${formatDate(event.date)} at ${event.time || '10:00 AM'}</p>
            `;

            confirmModal.style.display = "flex";

            document.getElementById("cancelModalBtn").onclick = () => {
                confirmModal.style.display = "none";
            };

            document.getElementById("confirmModalBtn").onclick = () => {
                const regs = getRegistrations();
                const events = getEvents();
                const ev = events.find(x => x.id === event.id);

                if (ev.attendees >= ev.maxAttendees) {
                    showToast("Event is full.", "error");
                    confirmModal.style.display = "none";
                    return;
                }

                regs.push({
                    userEmail: user.email,
                    eventId: event.id,
                    registeredAt: new Date().toISOString()
                });
                saveRegistrations(regs);

                ev.attendees = (ev.attendees || 0) + 1;
                saveEvents(events);

                confirmModal.style.display = "none";
                showToast("Successfully registered!", "success");
                
                // Re-render
                renderEventDetails(ev);
            };
        }
    </script>
</body>
</html>
