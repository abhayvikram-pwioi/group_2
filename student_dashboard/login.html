<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EduProgress | Login</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <!-- =========================
            LOGIN SECTION
    ========================== -->

    <section class="login-section">

        <!-- Left Panel -->

        <div class="left-panel">

            <div class="content">

                <h1>

                    Track Your
                    <br>

                    Learning Progress
                    <br>

                    with Ease

                </h1>

                <p>

                    Login to access your dashboard
                    and continue your learning journey.

                </p>

            </div>

            <div class="illustration">

                <img src="/student_dashboard/3d-graduate-character-achieving-study-goal-png.webp"
                    alt="Graduation Illustration">

            </div>

        </div>

        <!-- Right Panel -->

        <div class="right-panel">

            <div class="login-card">

                <!-- Icon -->

                <div class="card-icon">

                    <i class="fa-solid fa-book-open"></i>

                </div>

                <!-- Heading -->

                <h2>EduProgress</h2>

                <p class="subtitle" id="authSubtitle">

                    Login to your account

                </p>

                <!-- Message Alert Box -->
                <div id="authMessage" style="display: none; padding: 12px; margin-bottom: 20px; border-radius: 8px; font-size: 14px; font-weight: 500; text-align: center;"></div>

                <!-- Form -->

                <form id="loginForm">

                    <!-- Email -->

                    <div class="form-group">

                        <label>Email Address</label>

                        <input
                            type="email"
                            id="email"
                            placeholder="student@example.com"
                            required
                        >

                    </div>

                    <!-- Password -->

                    <div class="form-group">

                        <label>Password</label>

                        <div class="password-box">

                            <input
                                type="password"
                                id="password"
                                placeholder="Enter password"
                                required
                            >

                            <i class="fa-regular fa-eye toggle-password"></i>

                        </div>

                    </div>

                    <!-- Options -->

                    <div class="options" id="authOptions">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="#">Forgot Password?</a>

                    </div>

                    <!-- Login Button -->

                    <button
                        type="submit"
                        class="login-btn"
                        id="submitBtn">

                        Login

                    </button>

                </form>

                <!-- Signup Toggle -->
                <div style="text-align: center; margin-top: 20px;">
                    <p style="font-size: 14px; color: #6B7280;" id="toggleText">
                        Don't have an account? 
                        <a href="#" id="toggleAuth" style="color: #5B5CEB; text-decoration: none; font-weight: 600;">Sign Up</a>
                    </p>
                </div>

            </div>

        </div>

    </section>

    <script type="module" src="login.js"></script>

</body>

</html>
