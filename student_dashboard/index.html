<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduProgress - Redirecting...</title>
    <script type="module">
        import { auth } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "dashboard.html";
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</head>
<body>
    <div style="font-family: 'Poppins', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: #f7f8fc; color: #22254d;">
        <h3>Redirecting to EduProgress...</h3>
    </div>
</body>
</html>
