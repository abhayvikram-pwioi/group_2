<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Dashboard - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="logo">
                <i class="fa-solid fa-dumbbell"></i>
                <h2>Gym Dashboard</h2>
            </div>
        <form id="login-form" class="login-form">
            <div id="error-alert" class="error-alert" style="display: none;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="error-message">Incorrect username or password.</span>
            </div>

            <div class="form-group">
                <label for="login-username">Username</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="login-username" placeholder="Enter username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <span>Login</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="divider">
            <span>Or Quick Access Profiles</span>
        </div>
        
        <div class="user-grid" id="user-grid">
            <!-- User cards will be injected here via JS -->
        </div>

        <div class="login-footer">
            <a href="home.html" class="back-home-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Home
            </a>
            <p class="signup-prompt">Don't have an account? <a href="signup.html">Sign up free</a></p>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
